<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI 문서 분석기</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .upload-form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input[type="file"] {
            margin-bottom: 20px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result-box {
            margin-top: 30px;
            background-color: #f0f8ff;
            border: 1px solid #cce5ff;
            border-radius: 5px;
            padding: 20px;
            text-align: left;
            word-wrap: break-word; /* 긴 텍스트가 박스 밖으로 나가지 않도록 함 */
        }
        #result-box h2 {
            color: #007bff;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 문서 분석기</h1>
        <p>PDF 또는 DOCX 파일을 업로드하여 AI 분석을 받아보세요.</p>
        <form id="upload-form" class="upload-form" action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file" id="file-input" required>
            <button type="submit">분석 시작</button>
        </form>
        <div id="result-box" style="display: none;">
            <h2>분석 결과</h2>
            <p id="analysis-text"></p>
        </div>
    </div>

    <script>
        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            const resultBox = document.getElementById('result-box');
            const analysisText = document.getElementById('analysis-text');

            analysisText.textContent = "문서를 분석 중입니다. 잠시만 기다려주세요...";
            resultBox.style.display = 'block';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (response.ok) {
                    analysisText.textContent = result.analysis;
                } else {
                    analysisText.textContent = `오류: ${result.error}`;
                }
            } catch (error) {
                analysisText.textContent = "네트워크 오류가 발생했습니다.";
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
