<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Resume Portal{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

<header class="bg-white shadow-md w-full">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-800">
        <a href="{{ url_for('index') }}" class="hover:text-gray-900">Resume Portal</a>
    </h1>
    <nav>
      {% if 'user' in session %}
        <a href="{{ url_for('my_resumes') }}" class="text-gray-600 hover:text-gray-900 mx-2">My Resumes</a>
        <span class="mx-2 text-gray-800">Hello, {{ session['user'] }}</span>
        <a href="{{ url_for('logout') }}" class="text-white bg-red-500 hover:bg-red-600 px-3 py-1 rounded ml-2">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}" class="text-white bg-blue-500 hover:bg-blue-600 px-3 py-1 rounded ml-2">Login</a>
        <a href="{{ url_for('signup') }}" class="text-white bg-green-500 hover:bg-green-600 px-3 py-1 rounded ml-2">Sign Up</a>
      {% endif %}
    </nav>
  </div>
</header>

<main class="flex-grow">
{% block content %}{% endblock %}
</main>

<footer class="bg-white shadow-inner mt-auto">
<div class="max-w-7xl mx-auto px-4 py-4 text-center text-gray-500">
&copy; 2025 Team Project. All rights reserved.
</div>
</footer>

</body>
</html>
