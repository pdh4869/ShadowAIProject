{% extends "base.html" %}
{% block content %}
<div class="flex flex-col items-center px-4 py-10">
  <div class="bg-white shadow-lg rounded-lg p-8 max-w-lg w-full">
    <h2 class="text-xl font-semibold text-gray-700 mb-6 text-center">My Resumes</h2>
    {% if resumes %}
    <ul class="flex flex-col gap-2">
      {% for resume in resumes %}
      <li class="flex justify-between items-center border-b border-gray-200 py-2">
        <span>{{ resume.filename }}</span>
        <a href="{{ url_for('view_file', file_id=resume.id) }}" target="_blank" class="text-blue-500 hover:underline">View</a>
      </li>
      {% endfor %}
    </ul>
    {% else %}
      <p class="text-gray-600 text-center">업로드한 이력서가 없습니다.</p>
    {% endif %}
    <a href="{{ url_for('index') }}" class="mt-4 inline-block text-blue-500 hover:underline">Back to Home</a>
  </div>
</div>
{% endblock %}
