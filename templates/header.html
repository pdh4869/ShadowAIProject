<header class="bg-white shadow-md w-full">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-800">
        <a href="{{ url_for('main.index') }}" class="hover:text-gray-900">Resume Portal</a>
    </h1>
    <nav>
      {% if 'user' in session %}
        <a href="{{ url_for('upload.my_resumes') }}" class="text-gray-600 hover:text-gray-900 mx-2">My Resumes</a>
        <span class="mx-2 text-gray-800">Hello, {{ session['user'] }}</span>
        <a href="{{ url_for('auth.logout') }}" class="text-white bg-red-500 hover:bg-red-600 px-3 py-1 rounded ml-2">Logout</a>
      {% else %}
        <a href="{{ url_for('auth.login') }}" class="text-white bg-blue-500 hover:bg-blue-600 px-3 py-1 rounded ml-2">Login</a>
        <a href="{{ url_for('auth.signup') }}" class="text-white bg-green-500 hover:bg-green-600 px-3 py-1 rounded ml-2">Sign Up</a>
      {% endif %}
    </nav>
  </div>
</header>
